# SprintLog Boot의 기본 설정 파일
# 공통 파일
# Spring Boot가 초기화될 때 항상 이 파일을 읽는다

spring:
  application:
    name: sprintlog-boot

  profiles:
    active: dev # prod로 변경하면 적재하지 않았다고 표기됨
    # 공통 내용과 겹치는 건 dev쪽 우선

  survelet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 20MB

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /api-docs-ui.html # UI page 경로
    tags-sorter: alpha # 태그 정렬 방식 (알파벳순)
    operations-sorter: method # 메서드 정렬 방식
    display-request-duration: true # 요청과 응답에 소요된 시간 표시 - default: false
    doc-expansion: list # 문서 펼침 상태 (none, list, full) - full은 모든 것 표시

  api-docs:
    path: /my-api #Swagger가 우리 API의 정보를 얻어오기 위해 요청하는 url

sprintlog:
  welcome-message: "SprintLog Boot - 외부 설정 시연(기본)"
  sample-data:
    enabled: true
    count: "4"

  file-directory: "/Users/apple/Desktop/codeit13-develop/spring-upload"

